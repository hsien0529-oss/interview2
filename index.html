<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team 6677G - Interview Cue Cards (第五版 0329)</title>
<style>
  :root {
    --primary: #1E3A5F;
    --accent: #E8913A;
    --light-bg: #F5F6FA;
    --dark: #222;
    --gray: #888;
    --fiona: #7B2D8E;
    --hayden: #2E5B8A;
    --lucas: #2E7D32;
    --ryan: #B85C2D;
    --amber: #B82D3E;
    --lucashsu: #4A6741;
    --everyone: #1E3A5F;
    --trap-red: #CC3333;
    --trap-bg: #FFF0F0;
    --key-green: #1B7D3A;
    --key-green-bg: #E0F0E0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--primary);
    color: var(--dark);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
  .tab-bar {
    display: flex;
    background: #16304F;
    border-bottom: 3px solid var(--accent);
    flex-shrink: 0;
  }
  .tab-bar button {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    color: #8EABC8;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .tab-bar button.active {
    color: #fff;
    background: var(--primary);
  }
  .tab-bar button.active::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
  }
  .tab-bar button:hover:not(.active) {
    background: rgba(255,255,255,0.05);
    color: #B0C8E0;
  }
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .sidebar {
    width: 220px;
    background: #F0F2F7;
    border-right: 1px solid #D8DCE6;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #C0C4CE; border-radius: 2px; }
  .sidebar .section-label {
    padding: 10px 14px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
  }
  .sidebar button {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 14px;
    border: none;
    background: transparent;
    text-align: left;
    font-size: 13px;
    color: #444;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar button:hover {
    background: #E4E7F0;
  }
  .sidebar button.active {
    background: #fff;
    color: var(--primary);
    font-weight: 700;
    border-left-color: var(--accent);
  }
  .sidebar button .num {
    display: inline-block;
    width: 28px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .sidebar button .trap-badge {
    display: inline-block;
    background: var(--trap-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .sidebar button .star-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .content {
    flex: 1;
    background: #fff;
    overflow-y: auto;
    padding: 0;
  }
  .card {
    display: none;
    padding: 36px 48px;
    max-width: 900px;
    animation: fadeIn 0.2s ease;
  }
  .card.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card .category-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
  }
  .card .trap-warning {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: var(--trap-red);
    margin-left: 8px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .card .question {
    font-size: 28px;
    font-weight: 800;
    color: var(--dark);
    line-height: 1.35;
    margin-bottom: 20px;
  }
  .card .who-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid #E8ECF2;
  }
  .card .who-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .card .who-label {
    font-size: 14px;
    color: var(--gray);
  }
  .card .answer-text {
    font-size: 22px;
    line-height: 1.65;
    color: #333;
    margin-bottom: 28px;
  }
  .card .key-box {
    padding: 16px 24px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card .key-box.normal {
    background: var(--key-green-bg);
    border: 2px solid #B0D8B0;
  }
  .card .key-box.trap {
    background: #FFE0E0;
    border: 2px solid #F0B0B0;
  }
  .card .key-label {
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .card .key-value {
    font-size: 24px;
    font-weight: 800;
  }
  .card .script-line {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
    align-items: flex-start;
  }
  .card .script-name {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    min-width: 80px;
    text-align: center;
    margin-top: 2px;
  }
  .card .script-text {
    font-size: 20px;
    line-height: 1.6;
    color: #333;
  }
  .card .time-hint {
    display: inline-block;
    padding: 3px 10px;
    background: #EEF0F5;
    border-radius: 4px;
    font-size: 12px;
    color: var(--gray);
    margin-left: 12px;
    font-weight: 600;
  }
  mark {
    background: #FFE566;
    color: inherit;
    padding: 1px 3px;
    border-radius: 3px;
  }
  mark.red {
    background: #FF69B4;
    color: inherit;
    padding: 1px 3px;
    border-radius: 3px;
  }
  .new-badge {
    display: inline-block;
    background: #FFF3E0;
    color: var(--accent);
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }
  .footer-bar {
    background: #EEF1F8;
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    color: #5A6A8A;
    flex-shrink: 0;
    border-top: 1px solid #D8DCE6;
  }
  .footer-bar strong { color: var(--accent); }
  .kbd-hint {
    position: fixed;
    bottom: 44px;
    right: 16px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 99;
    line-height: 1.6;
  }
  .kbd-hint kbd {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 1px 7px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    margin: 0 2px;
  }
  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar .section-label { display: none; }
    .sidebar button { padding: 8px 4px; justify-content: center; font-size: 0; }
    .sidebar button .num { font-size: 12px; width: 36px; height: 28px; line-height: 28px; }
    .sidebar button .trap-badge, .sidebar button .star-badge { display: none; }
    .card { padding: 24px 20px; }
    .card .question { font-size: 22px; }
    .card .answer-text { font-size: 18px; }
    .card .script-text { font-size: 17px; }
    .card .key-value { font-size: 20px; }
  }
  .legend {
    position: fixed;
    top: 54px;
    right: 16px;
    background: rgba(255,255,255,0.95);
    border: 1px solid #D8DCE6;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    line-height: 2;
    z-index: 50;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .legend-dot {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="legend">
  <span class="legend-dot" style="background:#FFE566"></span>記得加動作<br>
  <span class="legend-dot" style="background:#FF69B4"></span>放慢語調．加強重音
</div>
<div class="tab-bar">
  <button class="active" onclick="switchTab('main')">Main Script 主稿</button>
  <button onclick="switchTab('followup')">Follow-Up Q&A 追問提示</button>
</div>
<div class="main-area">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
<div class="footer-bar">
  <strong>Remember:</strong> Slow down &nbsp;|&nbsp; Look at judges &nbsp;|&nbsp; Pause between sentences &nbsp;|&nbsp; Use data!
</div>
<div class="kbd-hint">
  <kbd>&uarr;</kbd><kbd>&darr;</kbd> prev/next &nbsp; <kbd>Tab</kbd> switch tab
</div>
<script>
const NAME_COLORS = {
  Fiona: 'var(--fiona)', Hayden: 'var(--hayden)', Lucas: 'var(--lucas)',
  Ryan: 'var(--ryan)', Amber: 'var(--amber)', 'Lucas Hsu': 'var(--lucashsu)',
  Everyone: 'var(--everyone)',
};
const mainScriptData = [
  {
    id: 'm1', num: 'Q1', title: 'Introduction', titleZh: '自我介紹', time: '~45s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Fiona', text: 'Hello, we are Team 6677G. Our team has five members. I\'m Fiona. I record our meetings and manage our engineering notebook.' },
      { name: 'Hayden', text: 'I\'m Hayden. I mainly work on programming and help with robot structure.' },
      { name: 'Lucas', text: 'I\'m Lucas. I design and improve the robot and assist with programming.' },
      { name: 'Ryan', text: 'I\'m Ryan. I help design the robot and plan our World Championship pit.' },
      { name: 'Amber', text: 'I\'m Amber. I work on notebook layout and English translation.' },
      { name: 'Lucas Hsu', isNew: true, text: 'I\'m Lucas Hsu. I am today\'s translator.' },
    ],
  },
  {
    id: 'm2', num: 'Q2', title: 'Achievements', titleZh: '本賽季成就', time: '~50s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Amber', text: 'This season, we are proud that our robot\'s scoring ability improved a lot. At the beginning, we could only <mark>stack pins</mark>. Now we can place a <mark>Small Y on the standoff</mark> and build three stacks in the <mark>triangle goal.</mark>' },
      { name: 'Amber', isNew: true, text: 'Recently, we also improved the claw structure and program, and now we succeeded to grab the <mark>starting Pin</mark> and <mark>stack with it.</mark>' },
      { name: 'Fiona', text: 'We also improved our teamwork. This is our first year working together, so we had different ideas. We learned to communicate, share opinions, and vote to make decisions. In the end, we <mark class="red">achieved the Teamwork Champion award in Taiwan.</mark>' },
    ],
  },
  {
    id: 'm3', num: 'Q3', title: 'Challenges', titleZh: '遇到的挑戰', time: '~60s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Lucas', text: 'One challenge was that our claw could not hold pins stably. We tested different designs, increased friction, and adjusted the program. After many tests, the claw became much more stable.' },
      { name: 'Lucas', isNew: true, text: 'Another challenge was our hook arm could not lift high enough. We changed the <mark class="red">gear ratio from 2.5 to 5 for more torque</mark>, and added another motor. We also adjusted the pivot to move it forward and upward so the arm can lift higher. Now it can lift above <mark class="red">27.5 centimeters</mark> to <mark>place the beam on the standoff.</mark>' },
      { name: 'Ryan', text: 'Another problem was scoring in the triangle goal. We changed the guide design, claw angle, and programming. Now we can consistently place three stacks.' },
    ],
  },
  {
    id: 'm4', num: 'Q4', title: 'Game Strategy', titleZh: '比賽策略', time: '~70s',
    catColor: 'var(--ryan)',
    lines: [
      { name: 'Ryan', text: 'First, we study the game rules and scoring system. Then we test different strategies and choose the most stable one. For teamwork matches, we <mark class="red">communicate with our alliance</mark> and understand their abilities. We prepared <mark class="red">six</mark> different game plans and practiced all of them many times.' },
      { name: 'Ryan', text: 'For example, when our alliance had only a 20% success rate for <mark>building a Y,</mark> we changed the strategy and took over that task to improve consistency.' },
      { name: 'Amber', isNew: true, text: 'For Skills Drive, our goal is <mark class="red">291 points</mark>. We split the driving time. The first driver has 35 seconds to finish the <mark>Standoff Y</mark> and <mark>Y.</mark> The second driver has 25 seconds to stack matches in the <mark>floor goal</mark> and <mark>triangle goal</mark>.' },
      { name: 'Amber', isNew: true, text: 'For Skills Autonomous, our goal is <mark class="red">246 points</mark>. We use the rule that lets us pick up the robot by hand. After completing two Ys, we quickly bring the robot back to the start and use the Loader to rapidly stack matches.' },
    ],
  },
  {
    id: 'm5', num: 'Q5', title: 'Engineering Design Process', titleZh: '工程設計流程', time: '~55s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Hayden', isNew: true, text: 'We follow the engineering design process. First, we <mark class="red">identify problems</mark> and <mark class="red">challenges</mark>. Then we <mark class="red">brainstorm</mark> ideas and do research online. For our research, we study competition videos of top teams. For example, learning from Chinese teams and their clutch designs gave us great inspiration!' },
      { name: 'Lucas', isNew: true, text: 'After choosing a solution, we <mark class="red">build, test, and improve</mark>. Sometimes the design does not work, so we restart and try again. Step by step, we developed our fifth-generation robot.' },
    ],
  },
  {
    id: 'm6', num: 'Q6', title: 'Robot Reliability', titleZh: '機器人穩定性', time: '~60s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Fiona', isNew: true, text: 'We believe testing is very important. We test our robot many times to find problems. We discovered that dirty rubber bands reduce friction, so we replace them. For structures that easily crash, we use pin connectors instead of screws to make them stronger. We also added guide angles and position limits to make sure the claw is always in the correct spot.' },
      { name: 'Fiona', isNew: true, text: 'Because we use omni wheels, the robot may slide left and right in autonomous mode and cause errors. So we added <mark>non-slide wheels</mark> on the sides to reduce sliding and make autonomous more stable.' },
      { name: 'Amber', isNew: true, text: 'We also designed a <mark>positioning structure</mark> to make it much more stable when we place a <mark>U-shaped object on a stack of two pins.</mark>' },
      { name: 'Amber', text: 'We also use slow-motion video to analyze the robot. This helps us find problems more precisely and improve performance.' },
    ],
  },
  {
    id: 'm7', num: 'Q7', title: 'Creativity', titleZh: '最具創意的設計', time: '~60s',
    catColor: 'var(--accent)', star: true,
    lines: [
      { name: 'Amber', text: 'Our most creative design is our <mark class="red">PTO clutch system</mark> using pneumatics. Because this design our robot has a <mark class="red">four-motor drivetrain</mark>, it helps reduce speed loss when carrying objects and turning.' },
      { name: 'Amber', text: 'When the pneumatic <mark>shaft extends</mark>, it powers the drivetrain. When it <mark>retracts, it</mark> powers the hook arm. We tested our Gen 4 and Gen 5 robots under different <mark>loads</mark>. Our Gen 5 is about 14.5% faster. This <mark class="red">gives us about 8.7 more seconds</mark> in a 60-second run, which helps us score more points.' },
    ],
  },
  {
    id: 'm8', num: 'Q8', title: 'Programming', titleZh: '程式設計', time: '~70s',
    catColor: 'var(--hayden)',
    lines: [
      { name: 'Hayden', isNew: true, text: 'In Autonomous mode, we use the <mark class="red">gyro go</mark> and <mark class="red">gyro turn</mark> to help our robot\'s movement more accurately and stably.' },
      { name: 'Hayden', isNew: true, text: 'We also use <mark class="red">My Blocks</mark> to repeat actions, so we can easily build and control our robot path.' },
      { name: 'Hayden', text: 'We also use a <mark>distance sensor</mark> to detect the distance between the claw and the pin, which helps with accurate grabbing during Autonomous.' },
      { name: 'Hayden', isNew: true, text: 'We also use a <mark>Touch LED</mark> as a safety check before the program starts. We use the gyro to calibrate to make sure all parts return to the correct starting position.' },
      { name: 'Ryan', isNew: true, text: 'The LED shows red when the robot is still checking. The LED shows green when it is ready to start.' },
      { name: 'Ryan', isNew: true, text: 'In Driver-Controlled mode, we use "<mark class="red">wait until</mark>" so the robot only performs actions when we press a button.' },
      { name: 'Ryan', isNew: true, text: 'We also add <mark class="red">safety checks</mark> to prevent repeated actions.' },
      { name: 'Ryan', isNew: true, text: 'In addition, the <mark class="red">Touch LED</mark> green light means the claw is at the lowest position, so we can grab the Pin safely.' },
    ],
  },
  {
    id: 'm9', num: 'Q9', title: 'Project Management', titleZh: '專案管理', time: '~40s',
    catColor: 'var(--primary)',
    lines: [
      { name: 'Fiona', text: 'We use a timeline and weekly meetings to track progress. We check our to-do list to make sure tasks are completed on time.' },
      { name: 'Amber', text: 'We record all changes and test results in our engineering notebook. This helps us understand what works and what needs improvement.' },
      { name: 'Hayden', isNew: true, text: 'For programming, every time we test, we save the project with a new name and add the date. This makes sure our old files are never overwritten, and we can easily find our old test data.' },
    ],
  },
  {
    id: 'm10', num: 'Q10', title: 'Closing', titleZh: '結語＋補充', time: '~90s',
    catColor: 'var(--fiona)',
    lines: [
      { name: 'Amber', isNew: true, text: 'I want to add about our robot design and improvements. We added a guide under the claw to help stack Pins more easily. But a fixed guide caused problems when placing high towers or in the triangle goal. So we changed it to a pneumatic guide that can <mark>lift up and down.</mark>' },
      { name: 'Lucas', isNew: true, text: 'When we flip 180 degrees or lift three Pins, we found that resistance increases and makes it harder to reach our target angle. So we added <mark>rubber bands</mark> to provide extra force and help the robot move better.' },
      { name: 'Hayden', isNew: true, text: 'I want to add about our programming. For gyro correction, we subtract the target angle from the current angle to get the error. Then we adjust the left and right motor power to make the robot turn more accurately.' },
      { name: 'Fiona', text: 'Thank you for listening. We are proud of our teamwork, continuous improvement, and engineering process.' },
    ],
  },
];
const followUpData = [
  { id: 'f1', num: 'Q1', category: 'EDP', catColor: 'var(--hayden)', question: 'How did you know your design was better?', who: 'Fiona', answer: 'We tested our design many times and compared the results. For example, after we improved our claw, our success rate increased from about 50% to nearly 100%. This showed that our new design was more stable and reliable.', key: '50% → 100%' },
  { id: 'f2', num: 'Q2', category: 'EDP', catColor: 'var(--hayden)', question: 'What would you improve if you had more time?', who: 'Lucas', answer: 'If we had more time, we would improve our robot\'s speed and consistency. Sometimes our robot is fast, but not always stable. We want to make it both fast and reliable by doing more testing and optimizing our design.', key: 'Speed + Consistency' },
  { id: 'f3', num: 'Q3', category: 'EDP', catColor: 'var(--hayden)', question: 'Did any design fail? What did you learn?', who: 'Lucas', answer: 'Yes, one of our early claw designs failed. It could not hold the pins securely. We learned that friction and structure are very important. After testing different designs, we improved the stability a lot.', key: 'Admit failure = bonus!' },
  { id: 'f4', num: 'Q4', category: 'Strategy', catColor: 'var(--ryan)', question: 'Why did you choose this strategy?', who: 'Ryan', answer: 'We chose this strategy because it is the most stable for our robot. We tested several strategies and compared their success rates. This one gave us the best balance between score and consistency.', key: 'Stable + Tested' },
  { id: 'f5', num: 'Q5', category: 'Strategy', catColor: 'var(--ryan)', question: 'How do you adapt during a match?', who: 'Ryan', answer: 'We observe our alliance partner\'s ability before the match. If they are not stable, we adjust our role. For example, if they cannot build a Y, we will take that role instead.', key: 'Observe → Adjust' },
  { id: 'f6', num: 'Q6', category: 'Strategy', catColor: 'var(--ryan)', question: 'How do you decide between speed and accuracy?', who: 'Ryan', answer: 'We usually choose accuracy first. Because if we fail, we lose more time. After we become stable, we try to increase speed.', key: 'Accuracy FIRST!' },
  { id: 'f7', num: 'Q7', category: 'Robot', catColor: 'var(--lucas)', question: 'Why did you choose this design?', who: 'Lucas', answer: 'We chose this design because it solves our main problem. For example, our PTO system allows one motor system to do two functions. This makes our robot more efficient.', key: 'PTO = 2 functions, 1 system' },
  { id: 'f8', num: 'Q8', category: 'Robot', catColor: 'var(--lucas)', question: 'Who built the robot?', who: 'Amber', answer: 'We designed and built the robot by ourselves. Adults only guide us and do not make decisions for us.', key: 'WE built it. Adults ONLY guide.', trap: true },
  { id: 'f9', num: 'Q9', category: 'Robot', catColor: 'var(--lucas)', question: 'What is the most difficult part to build?', who: 'Lucas', answer: 'The most difficult part was our claw. We had to adjust the angle, friction, and structure many times. It took a lot of testing to make it stable.', key: 'Claw = hardest, many iterations' },
  { id: 'f10', num: 'Q10', category: 'Programming', catColor: 'var(--hayden)', question: 'How do you test your code?', who: 'Hayden', answer: 'We test our code step by step. We check each movement and adjust timing and speed. We repeat testing until it becomes stable.', key: 'Step by step → repeat' },
  { id: 'f11', num: 'Q11', category: 'Programming', catColor: 'var(--hayden)', question: "Why didn't you use more sensors?", who: 'Hayden', answer: 'We tried using a distance sensor, but it was not stable because of our design. So we decided to use a more reliable method instead.', key: 'Tried → unstable → changed' },
  { id: 'f12', num: 'Q12', category: 'Programming', catColor: 'var(--hayden)', question: 'What does your code do to improve consistency?', who: 'Hayden', answer: 'We reset all mechanisms at the start and use fixed positions to reduce errors. This helps our robot perform the same every time.', key: 'Reset + fixed positions' },
  { id: 'f13', num: 'Q13', category: 'Creativity', catColor: 'var(--accent)', question: 'Why is your design creative?', who: 'Amber', answer: 'Our design is creative because it combines two functions into one system. Our PTO clutch allows us to switch between driving and lifting. This improves efficiency and performance.', key: '2-in-1 system = creative' },
  { id: 'f14', num: 'Q14', category: 'Creativity', catColor: 'var(--accent)', question: 'How do you prove it is better?', who: 'Amber', answer: 'We tested our Gen 4 and Gen 5 robots. Gen 5 is about 14.5% faster. This gives us about 8.7 more seconds to score in a match.', key: '14.5% faster = 8.7 sec more', star: true },
  { id: 'f15', num: 'Q15', category: 'Teamwork', catColor: 'var(--fiona)', question: 'How do you solve disagreements?', who: 'Fiona', answer: 'When we have different ideas, we discuss them first. Then we vote to make a final decision. This helps us work efficiently as a team.', key: 'Discuss → Vote' },
  { id: 'f16', num: 'Q16', category: 'Teamwork', catColor: 'var(--fiona)', question: 'How do you track your progress?', who: 'Fiona', answer: 'We use a timeline and weekly meetings. We also check our to-do list and record everything in our notebook.', key: 'Timeline + meetings + notebook' },
  { id: 'f17', num: 'Q17', category: 'Teamwork', catColor: 'var(--fiona)', question: 'What is your role in the team?', who: 'Everyone', answer: 'My role is to ______. I also help with ______. I contribute by sharing ideas and working with my teammates.', key: 'Fill in YOUR role!' },
  { id: 'f18', num: 'Q18', category: 'TRAP', catColor: 'var(--trap-red)', question: 'Did anyone help you build or design the robot?', who: 'Everyone', answer: 'We designed and built the robot by ourselves. Adults only guide us and do not make decisions for us.', key: 'WE did it. Adults ONLY guide.', trap: true },
  { id: 'f19', num: 'Q19', category: 'TRAP', catColor: 'var(--trap-red)', question: 'How many times did you test?', who: 'Fiona', answer: 'We tested many times. For some designs, we tested more than 20 times to improve stability and performance.', key: '20+ times per design', trap: true },
  { id: 'f20', num: 'Q20', category: 'Closing', catColor: 'var(--primary)', question: 'What makes your team special?', who: 'Everyone', answer: 'Our team is special because we keep improving and never give up. We test a lot, learn from failure, and work well together. That is how we built our current robot.', key: 'Improve + Never give up + Teamwork' },
];
// ===== STATE =====
let currentTab = 'main';
let currentIndex = 0;
function getData() {
  if (currentTab === 'main') return mainScriptData;
  return followUpData;
}
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const data = getData();
  let html = '';
  let lastCat = '';
  if (currentTab === 'main') {
    html += '<div class="section-label">Main Script 主稿</div>';
    data.forEach((item, i) => {
      const active = i === currentIndex ? ' active' : '';
      const starHtml = item.star ? '<span class="star-badge">KEY</span>' : '';
      html += '<button class="' + active + '" onclick="goTo(' + i + ')">' +
        '<span class="num" style="background:' + item.catColor + '">' + item.num + '</span>' +
        item.title +
        starHtml +
      '</button>';
    });
  } else {
    const categories = [];
    data.forEach((item, i) => {
      if (item.category !== lastCat) {
        categories.push({ label: item.category, startIdx: i });
        lastCat = item.category;
      }
    });
    categories.forEach(cat => {
      html += '<div class="section-label">' + cat.label + '</div>';
      data.forEach((item, i) => {
        if (item.category === cat.label) {
          const active = i === currentIndex ? ' active' : '';
          const trapHtml = item.trap ? '<span class="trap-badge">TRAP</span>' : '';
          const starHtml = item.star ? '<span class="star-badge">KEY</span>' : '';
          html += '<button class="' + active + '" onclick="goTo(' + i + ')">' +
            '<span class="num" style="background:' + item.catColor + '">' + item.num + '</span>' +
            (item.question.length > 22 ? item.question.substring(0, 22) + '...' : item.question) +
            trapHtml + starHtml +
          '</button>';
        }
      });
    });
  }
  sidebar.innerHTML = html;
}
function renderContent() {
  const content = document.getElementById('content');
  const data = getData();
  const item = data[currentIndex];
  let html = '';
  if (currentTab === 'main') {
    html = '<div class="card active">' +
      '<span class="category-badge" style="background:' + item.catColor + '">' + item.num + ' &mdash; ' + item.titleZh + '</span>' +
      (item.star ? '<span class="trap-warning" style="background:var(--accent);animation:none">KEY SLIDE</span>' : '') +
      '<span class="time-hint">' + item.time + '</span>' +
      '<h1 class="question" style="margin-top:14px">' + item.title + '</h1>' +
      '<div style="border-bottom:1px solid #E8ECF2;margin-bottom:24px"></div>' +
      item.lines.map(function(l) {
        return '<div class="script-line">' +
          '<span class="script-name" style="background:' + NAME_COLORS[l.name] + '">' + (l.isNew ? '<span class="new-badge">NEW</span>' : '') + l.name + '</span>' +
          '<span class="script-text">' + l.text + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  } else {
    const isTrap = item.trap;
    const boxClass = isTrap ? 'trap' : 'normal';
    const keyColor = isTrap ? 'var(--trap-red)' : 'var(--key-green)';
    html = '<div class="card active"' + (isTrap ? ' style="background:var(--trap-bg)"' : '') + '>' +
      '<span class="category-badge" style="background:' + item.catColor + '">' + item.category + '</span>' +
      (isTrap ? '<span class="trap-warning">TRAP QUESTION</span>' : '') +
      (item.star ? '<span class="trap-warning" style="background:var(--accent);animation:none">KEY ANSWER</span>' : '') +
      '<h1 class="question">' + item.question + '</h1>' +
      '<div class="who-row">' +
        '<span class="who-badge" style="background:' + (NAME_COLORS[item.who] || 'var(--primary)') + '">' + item.who + '</span>' +
        '<span class="who-label">answers this question</span>' +
      '</div>' +
      '<div class="answer-text">' + item.answer + '</div>' +
      '<div class="key-box ' + boxClass + '">' +
        '<span class="key-label" style="color:' + keyColor + '">KEY:</span>' +
        '<span class="key-value" style="color:' + keyColor + '">' + item.key + '</span>' +
      '</div>' +
    '</div>';
  }
  content.innerHTML = html;
}
function goTo(index) {
  const data = getData();
  currentIndex = Math.max(0, Math.min(index, data.length - 1));
  renderSidebar();
  renderContent();
  const activeBtn = document.querySelector('.sidebar button.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
function switchTab(tab) {
  currentTab = tab;
  currentIndex = 0;
  document.querySelectorAll('.tab-bar button').forEach(btn => {
    const t = btn.textContent;
    btn.classList.toggle('active',
      (tab === 'main' && t.includes('Main')) ||
      (tab === 'followup' && t.includes('Follow'))
    );
  });
  renderSidebar();
  renderContent();
}
document.addEventListener('keydown', (e) => {
  const data = getData();
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    goTo(currentIndex + 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    goTo(currentIndex - 1);
  } else if (e.key === 'Tab') {
    e.preventDefault();
    switchTab(currentTab === 'main' ? 'followup' : 'main');
  } else if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < data.length) goTo(idx);
  } else if (e.key === '0') {
    goTo(9);
  }
});
renderSidebar();
renderContent();
</script>
</body>
</html>
